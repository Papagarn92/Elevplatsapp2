<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platsdelning för elever</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎓 Platsdelning för elever</h1>
        <div class="controls">
            <div class="control-row">
                <div class="control-group">
                    <label for="classroomSelect">📍 Välj Sal:</label>
                    <select id="classroomSelect"></select> <!-- Fylls av JS -->
                </div>

                <!-- Rullista för klasser, visas/döljs av JS -->
                <div id="name-container" class="control-group">
                    <label for="classSelect">👥 Välj Klass:</label>
                    <select id="classSelect"></select> <!-- Fylls av JS -->
                </div>
            </div>

            <div class="button-group">
                <button id="drawButton" class="btn-primary">✨ Placera Elever</button>
                <button id="resetButton" class="btn-secondary">🔄 Återställ Karta</button>
            </div>
        </div>

        <div id="classroom-layout"></div> <!-- Fylls av JS -->
    </div>

    <!-- Modal för bekräftelse -->
    <div id="confirmModal" class="modal hidden">
        <div class="modal-content">
            <p id="confirmMessage">Är du säker?</p>
            <div class="modal-buttons">
                <button id="confirmYes" class="btn-confirm">Ja, radera</button>
                <button id="confirmNo" class="btn-cancel">Avbryt</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
